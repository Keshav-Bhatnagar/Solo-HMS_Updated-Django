{% extends 'base.html' %}
{% load static %}

{% block title %}List New Item | CampusConnect{% endblock %}

{% block content %}
<main class="cn-portal">
  <div class="cn-form-page-container">
    <div class="cn-auth-card cn-form-card">
      <div class="cn-auth-header">
        <div class="cn-brand-icon marketplace-brand">
          <i class="fa-solid fa-tag"></i>
        </div>
        <h1>New Marketplace Listing</h1>
        <p>Institutional verification ensures student safety.</p>
      </div>

      <form method="POST" enctype="multipart/form-data" class="cn-auth-form">
        {% csrf_token %}
        
        <div class="cn-input-group">
          <label for="title" class="cn-input-label">Item Title</label>
          <div class="cn-input-wrapper">
            <i class="fa-solid fa-heading"></i>
            <input type="text" id="title" name="title" placeholder="e.g. Engineering Physics Textbook" required>
          </div>
        </div>

        <div class="cn-form-row">
          <div class="cn-input-group">
            <label for="category" class="cn-input-label">Institutional Category</label>
            <div class="cn-input-wrapper">
              <i class="fa-solid fa-layer-group"></i>
              <select name="category" id="category" required>
                {% for code, label in categories %}
                  <option value="{{ code }}">{{ label }}</option>
                {% endfor %}
              </select>
            </div>
          </div>

          <div class="cn-input-group">
            <label for="price" class="cn-input-label">Institutional Price (₹)</label>
            <div class="cn-input-wrapper">
              <i class="fa-solid fa-indian-rupee-sign"></i>
              <input type="number" id="price" name="price" placeholder="000" required>
            </div>
          </div>
        </div>

        <div class="cn-input-group">
          <label for="condition" class="cn-input-label">Item Condition</label>
          <div class="cn-input-wrapper">
            <i class="fa-solid fa-shield-heart"></i>
            <select name="condition" id="condition" required>
              {% for code, label in conditions %}
                <option value="{{ code }}">{{ label }}</option>
              {% endfor %}
            </select>
          </div>
        </div>

        <div class="cn-input-group">
          <label for="description" class="cn-input-label">Detailed Description</label>
          <div class="cn-input-wrapper alignment-top">
            <i class="fa-solid fa-pen-nib"></i>
            <textarea id="description" name="description" placeholder="Specify usage, warranty, and potential defects..." rows="4" required></textarea>
          </div>
        </div>

        <div class="cn-input-group">
          <label for="image" class="cn-input-label">Institutional Photo Verification</label>
          <div class="cn-file-upload-box">
            <input type="file" id="image" name="image" accept="image/*" class="cn-file-input">
            <div class="cn-file-placeholder">
              <i class="fa-solid fa-cloud-arrow-up"></i>
              <span>Upload Item Image (Max 5MB)</span>
            </div>
          </div>
        </div>

        <div class="cn-form-actions">
          <a href="{% url 'marketplace' %}" class="cn-btn cn-btn-ghost">Cancel</a>
          <button type="submit" class="cn-btn cn-btn-primary">Initialize Listing</button>
        </div>
      </form>
    </div>
  </div>
</main>

<style>
.cn-form-page-container {
  padding: 5rem 1.5rem;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  background: linear-gradient(135deg, var(--surface-highest), var(--bg-subtle));
  min-height: calc(100vh - 70px);
}

.cn-form-card {
  max-width: 760px;
  width: 100%;
  background: var(--surface-highest);
  backdrop-filter: blur(20px) saturate(180%);
  border: 1px solid var(--outline);
  box-shadow: var(--shadow-xl);
  border-radius: 24px;
  padding: 3rem;
}

.cn-auth-header {
  text-align: center;
  margin-bottom: 3rem;
}

.cn-auth-header h1 {
  font-size: 2.5rem;
  font-weight: 900;
  color: var(--on-bg);
  letter-spacing: -0.03em;
  margin-bottom: 0.5rem;
}

.cn-auth-header p {
  color: var(--on-surface-muted);
  font-size: 1.1rem;
}

.marketplace-brand {
  background: linear-gradient(135deg, #2563eb, #7c4dff);
  color: #fff;
  width: 64px; height: 64px;
  font-size: 1.5rem;
  margin: 0 auto 1.5rem;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 10px 20px rgba(37,99,235,0.2);
}

.cn-form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 2rem;
}

.cn-input-group {
  margin-bottom: 1.5rem;
}

.cn-input-label {
  display: block;
  font-size: 0.8rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--on-surface-muted);
  margin-bottom: 0.5rem;
}

.cn-input-wrapper {
  position: relative;
  background: var(--surface);
  border: 1px solid var(--outline);
  border-radius: 12px;
  transition: all 0.3s ease;
}

.cn-input-wrapper:focus-within {
  border-color: var(--primary);
  box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
}

.cn-input-wrapper i {
  position: absolute;
  left: 1.25rem;
  top: 50%;
  transform: translateY(-50%);
  color: var(--primary);
}

.cn-input-wrapper input,
.cn-input-wrapper select {
  width: 100%;
  padding: 1rem 1rem 1rem 3rem;
  background: transparent;
  border: none;
  font-size: 1rem;
  color: var(--on-bg);
  outline: none;
}

.cn-file-upload-box {
  border: 2px dashed var(--outline-strong);
  border-radius: 16px;
  padding: 3rem;
  text-align: center;
  position: relative;
  transition: all 0.3s ease;
  cursor: pointer;
  background: var(--surface-low);
}

.cn-file-upload-box:hover {
  border-color: var(--primary);
  background: var(--primary-container);
}

.cn-file-input {
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  opacity: 0;
  cursor: pointer;
}

.cn-file-placeholder {
  pointer-events: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1rem;
  color: var(--primary);
}

.cn-file-placeholder i {
  font-size: 2.5rem;
}
.cn-file-placeholder span {
  font-weight: 700;
  font-size: 1.1rem;
}

.cn-form-actions {
  display: flex;
  justify-content: flex-end;
  gap: 1.5rem;
  margin-top: 3rem;
}

.cn-btn {
  padding: 1rem 2rem;
  font-size: 1rem;
  font-weight: 800;
  border-radius: 100px;
}

textarea#description {
  width: 100%;
  padding: 1rem 1rem 1rem 3rem;
  background: transparent;
  border: none;
  color: var(--on-bg);
  font-family: inherit;
  font-size: 1rem;
  resize: vertical;
  min-height: 120px;
}
textarea#description:focus { outline: none; }

.alignment-top i {
  top: 1.5rem !important;
  transform: none !important;
}

@media (max-width: 600px) {
  .cn-form-row { grid-template-columns: 1fr; gap: 1.5rem; }
  .cn-form-card { padding: 2rem; }
}
</style>
{% endblock %}
