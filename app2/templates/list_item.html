{% extends 'base.html' %}
{% load static %}

{% block title %}List New Item | CampusConnect{% endblock %}

{% block content %}
<main class="cn-portal">
  <div class="cn-form-page-container">
    <div class="cn-auth-card cn-form-card">
      <div class="cn-auth-header">
        <div class="cn-brand-icon marketplace-brand">
          <i class="fa-solid fa-tag"></i>
        </div>
        <h1>New Marketplace Listing</h1>
        <p>Institutional verification ensures student safety.</p>
      </div>

      <form method="POST" enctype="multipart/form-data" class="cn-auth-form">
        {% csrf_token %}
        
        <div class="cn-input-group">
          <label for="title" class="cn-input-label">Item Title</label>
          <div class="cn-input-wrapper">
            <i class="fa-solid fa-heading"></i>
            <input type="text" id="title" name="title" placeholder="e.g. Engineering Physics Textbook" required>
          </div>
        </div>

        <div class="cn-form-row">
          <div class="cn-input-group">
            <label for="category" class="cn-input-label">Institutional Category</label>
            <div class="cn-input-wrapper">
              <i class="fa-solid fa-layer-group"></i>
              <select name="category" id="category" required>
                {% for code, label in categories %}
                  <option value="{{ code }}">{{ label }}</option>
                {% endfor %}
              </select>
            </div>
          </div>

          <div class="cn-input-group">
            <label for="price" class="cn-input-label">Institutional Price (₹)</label>
            <div class="cn-input-wrapper">
              <i class="fa-solid fa-indian-rupee-sign"></i>
              <input type="number" id="price" name="price" placeholder="000" required>
            </div>
          </div>
        </div>

        <div class="cn-input-group">
          <label for="condition" class="cn-input-label">Item Condition</label>
          <div class="cn-input-wrapper">
            <i class="fa-solid fa-shield-heart"></i>
            <select name="condition" id="condition" required>
              {% for code, label in conditions %}
                <option value="{{ code }}">{{ label }}</option>
              {% endfor %}
            </select>
          </div>
        </div>

        <div class="cn-input-group">
          <label for="description" class="cn-input-label">Detailed Description</label>
          <div class="cn-input-wrapper alignment-top">
            <i class="fa-solid fa-pen-nib"></i>
            <textarea id="description" name="description" placeholder="Specify usage, warranty, and potential defects..." rows="4" required></textarea>
          </div>
        </div>

        <div class="cn-input-group">
          <label for="image" class="cn-input-label">Institutional Photo Verification</label>
          <div class="cn-file-upload-box">
            <input type="file" id="image" name="image" accept="image/*" class="cn-file-input">
            <div class="cn-file-placeholder">
              <i class="fa-solid fa-cloud-arrow-up"></i>
              <span>Upload Item Image (Max 5MB)</span>
            </div>
          </div>
        </div>

        <div class="cn-form-actions">
          <a href="{% url 'marketplace' %}" class="cn-btn cn-btn-ghost">Cancel</a>
          <button type="submit" class="cn-btn cn-btn-primary">Initialize Listing</button>
        </div>
      </form>
    </div>
  </div>
</main>

<style>
.cn-form-page-container {
  padding: 4rem 1.5rem;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  background: var(--surface-low);
  min-height: calc(100vh - 70px);
}

.cn-form-card {
  max-width: 720px;
  width: 100%;
}

.marketplace-brand {
  background: var(--secondary-container);
  color: var(--secondary);
}

.cn-form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.5rem;
}

.cn-file-upload-box {
  border: 2px dashed var(--outline);
  border-radius: var(--radius-md);
  padding: 2rem;
  text-align: center;
  position: relative;
  transition: var(--transition);
  cursor: pointer;
}

.cn-file-upload-box:hover {
  border-color: var(--primary);
  background: var(--surface-card);
}

.cn-file-input {
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  opacity: 0;
  cursor: pointer;
}

.cn-file-placeholder {
  pointer-events: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.75rem;
  color: var(--on-surface-muted);
}

.cn-file-placeholder i {
  font-size: 2rem;
}

.cn-form-actions {
  display: flex;
  justify-content: flex-end;
  gap: 1rem;
  margin-top: 2rem;
}

textarea#description {
  width: 100%;
  padding: 0.75rem 1rem 0.75rem 2.5rem;
  background: transparent;
  border: none;
  color: var(--on-surface);
  font-family: inherit;
  resize: vertical;
}

.alignment-top i {
  top: 1.25rem !important;
  transform: none !important;
}

@media (max-width: 600px) {
  .cn-form-row {
    grid-template-columns: 1fr;
  }
}
</style>
{% endblock %}
