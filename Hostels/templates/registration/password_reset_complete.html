{% extends 'Rooms_base.html' %}
{% block title %}Password Reset Complete – CampusNest{% endblock %}

{% block content %}
<main style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #fdfcfb; padding-top: 72px;">
    <div style="background: #fff; padding: 3rem; border-radius: 16px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); width: 100%; max-width: 440px; border: 1px solid #e2e8f0; text-align: center;">
        <div style="width: 60px; height: 60px; background: #f0fdf4; color: #16a34a; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin: 0 auto 1.5rem;">
            <i class="fa-solid fa-check"></i>
        </div>
        <h2 style="font-size: 2rem; font-weight: 900; color: #1e293b; margin-bottom: 0.5rem;">Password Updated</h2>
        <p style="color: #64748b; font-size: 0.95rem; line-height: 1.6; margin-bottom: 2rem;">Your password has been successfully reset. You may now log in with your new credentials.</p>
        
        <a href="{% url 'login' %}" style="display: block; width: 100%; padding: 1rem; background: #2563eb; color: white; border-radius: 12px; font-weight: 800; text-decoration: none; text-transform: uppercase; letter-spacing: 0.1em; transition: 0.3s; box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);">
            Log In Now
        </a>
    </div>
</main>
{% endblock %}
