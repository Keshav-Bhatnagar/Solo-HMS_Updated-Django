{% extends 'Rooms_base.html' %}
{% block title %}Reset Password – CampusNest{% endblock %}

{% block content %}
<main style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #fdfcfb; padding-top: 72px;">
    <div style="background: #fff; padding: 3rem; border-radius: 16px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); width: 100%; max-width: 440px; border: 1px solid #e2e8f0;">
        <h2 style="font-size: 2rem; font-weight: 900; color: #1e293b; margin-bottom: 0.5rem; text-align: center;">Reset Password</h2>
        <p style="color: #64748b; font-size: 0.95rem; text-align: center; margin-bottom: 2rem;">Enter your email to receive a password reset link.</p>
        
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" style="width: 100%; padding: 1rem; margin-top: 1rem; background: #2563eb; color: white; border: none; border-radius: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer; box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);">
                Send Reset Link
            </button>
        </form>
    </div>
</main>
{% endblock %}
