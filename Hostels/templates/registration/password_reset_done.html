{% extends 'Rooms_base.html' %}
{% block title %}Email Sent – CampusNest{% endblock %}

{% block content %}
<main style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #fdfcfb; padding-top: 72px;">
    <div style="background: #fff; padding: 3rem; border-radius: 16px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); width: 100%; max-width: 440px; border: 1px solid #e2e8f0; text-align: center;">
        <div style="width: 60px; height: 60px; background: #eff6ff; color: #2563eb; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin: 0 auto 1.5rem;">
            <i class="fa-solid fa-envelope"></i>
        </div>
        <h2 style="font-size: 2rem; font-weight: 900; color: #1e293b; margin-bottom: 0.5rem;">Check your inbox</h2>
        <p style="color: #64748b; font-size: 0.95rem; line-height: 1.6; margin-bottom: 2rem;">We've emailed you instructions for setting your password, if an account exists with the email you entered. You should receive them shortly.</p>
        
        <a href="{% url 'login' %}" style="display: block; width: 100%; padding: 1rem; border: 1px solid #e2e8f0; border-radius: 12px; color: #1e293b; font-weight: 700; text-decoration: none; transition: 0.3s;">
            Return to Login
        </a>
    </div>
</main>
{% endblock %}
