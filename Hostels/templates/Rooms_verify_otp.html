{% extends 'Rooms_base.html' %}
{% load static %}

{% block content %}
<main class="cn-portal">
  <section class="cn-auth-container">
    <div class="cn-auth-card">
      <div class="cn-auth-header">
        <div class="cn-brand-icon">
          <i class="fa-solid fa-shield-halved"></i>
        </div>
        <h1>Security Verification</h1>
        <p>Institutional registration requires two-step verification.</p>
      </div>

      <div class="cn-verification-info">
        <p>A 6-digit code has been sent to:</p>
        <span class="cn-verify-email">{{ email }}</span>
      </div>

      <form method="POST" action="{% url 'verify_otp' %}" class="cn-auth-form">
        {% csrf_token %}
        <div class="cn-input-group">
          <label for="otp" class="cn-input-label">Enter Verification Code</label>
          <div class="cn-input-wrapper">
            <i class="fa-solid fa-key"></i>
            <input type="text" id="otp" name="otp" placeholder="000000" maxlength="6" required autofocus autocomplete="one-time-code">
          </div>
        </div>

        <button type="submit" class="cn-btn cn-btn-primary cn-full-width">
          Verify & Initialize Profile
        </button>
      </form>

      <div class="cn-auth-footer">
        <p>Didn't receive the code? <a href="{% url 'signup' %}">Sign up again</a></p>
      </div>
    </div>
  </section>
</main>

<style>
.cn-verification-info {
  text-align: center;
  margin-bottom: 2rem;
  padding: 1rem;
  background: var(--surface-variant);
  border-radius: var(--radius-md);
}

.cn-verify-email {
  display: block;
  font-weight: 600;
  color: var(--primary);
  margin-top: 0.5rem;
  word-break: break-all;
}

#otp {
  letter-spacing: 0.5rem;
  font-size: 1.25rem;
  font-weight: 700;
  text-align: center;
}

.cn-brand-icon {
  width: 64px;
  height: 64px;
  background: var(--primary-container);
  color: var(--primary);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.5rem;
  margin: 0 auto 1.5rem;
  border: 4px solid var(--outline-variant);
}
</style>
{% endblock %}
